    rule: `Le PRESENT PERFECT (HAVE/HAS + participe pass\xE9) s'utilise pour relier le pass\xE9 au pr\xE9sent. Trois cas fr\xE9quents :
1. Une exp\xE9rience de vie, sans pr\xE9ciser quand : "I have visited Italy." (\xE0 un moment de ma vie, peu importe quand)
2. Une action qui a commenc\xE9 dans le pass\xE9 et continue maintenant, avec FOR (dur\xE9e) ou SINCE (point de d\xE9part) : "She has lived here for 10 years / since 2014."
3. Une action r\xE9cente dont le r\xE9sultat est visible maintenant, souvent avec JUST, ALREADY, YET : "I have just finished." / "Have you done it yet?"

Marqueurs typiques du present perfect : ever, never, just, already, yet, since, for, so far, recently.

Le PAST SIMPLE s'utilise pour une action termin\xE9e \xE0 un moment pr\xE9cis et dat\xE9 du pass\xE9, sans lien direct avec le pr\xE9sent.
Marqueurs typiques du past simple : yesterday, last week/month/year, ... ago, in 2020, when I was a child.

R\xE8gle pratique : si on peut ajouter une date pr\xE9cise (yesterday, in 2019...) \u2192 past simple. Si l'action n'est pas dat\xE9e et garde un lien avec maintenant \u2192 present perfect.`,

BE GOING TO + infinitif :

PRESENT CONTINUOUS (be + V-ing) :
- projet futur pr\xE9cis et d\xE9j\xE0 organis\xE9, souvent avec une date/heure ("I'm meeting Sam at 5pm tomorrow.")

    summary: "Capacit\xE9, obligation, conseil, permission, possibilit\xE9",
    rule: `Les modaux (can, could, must, should, may, might, will, would, shall) sont des auxiliaires invariables : ils ne prennent JAMAIS de -s \xE0 la 3e personne et sont TOUJOURS suivis du verbe \xE0 l'infinitif SANS "to".

CAN / COULD : capacit\xE9 ("She can swim"), permission ("Can I go out?"), could = pass\xE9 de can ou demande polie.
MUST : obligation forte, souvent impos\xE9e par celui qui parle ("You must wear a seatbelt.")
HAVE TO : obligation externe, impos\xE9e par une r\xE8gle/situation ext\xE9rieure ("I have to wear a uniform at school.")
MUSTN'T : interdiction ("You mustn't smoke here.")
DON'T HAVE TO : absence d'obligation, ce n'est pas n\xE9cessaire ("You don't have to come if you're busy.")
SHOULD / SHOULDN'T : conseil, recommandation.
MAY / MIGHT : possibilit\xE9, permission formelle (may).

Diff\xE9rence cl\xE9 : MUSTN'T (interdit de) \u2260 DON'T HAVE TO (pas oblig\xE9 de, mais autoris\xE9).`,

MUCH / MANY / A LOT OF :

- MUCH + nom ind\xE9nombrable (how much money?)

man \u2192 men, woman \u2192 women, child \u2192 children, person \u2192 people, foot \u2192 feet, tooth \u2192 teeth, mouse \u2192 mice.

- IN : un espace ferm\xE9 ou d\xE9limit\xE9 \u2192 in the box, in the garden, in London, in the car (v\xE9hicule individuel).

    rule: `CONDITIONNEL TYPE 1 (r\xE9el, probable, possible dans le futur) :
IF + PRESENT SIMPLE, ... WILL + infinitif
\u2192 "If it rains, I will stay at home."

CONDITIONNEL TYPE 2 (hypoth\xE9tique, irr\xE9el ou peu probable, pr\xE9sent/futur) :
IF + PAST SIMPLE, ... WOULD + infinitif
\u2192 "If I won the lottery, I would travel the world."
On exprime une situation imaginaire, contraire \xE0 la r\xE9alit\xE9 actuelle, ou tr\xE8s peu probable.
Avec le verbe BE au past simple dans la condition, on utilise souvent "were" pour toutes les personnes : "If I were you..."

R\xE8gle d'or : on n'utilise JAMAIS "will" dans la partie qui commence par "if". La partie apr\xE8s la virgule (cons\xE9quence) peut commencer avant le "if" sans virgule : "I will stay at home if it rains."`,

Structure : SUJET + BE (conjugu\xE9 au temps voulu) + PARTICIPE PASS\xC9 (+ BY + agent, si on veut le pr\xE9ciser)

C'est l'auxiliaire BE qui porte le temps de la phrase :
- pr\xE9sent : is/are + participe pass\xE9 ("English is spoken here.")
- pass\xE9 : was/were + participe pass\xE9 ("The house was built in 1900.")
- present perfect : has/have been + participe pass\xE9 ("The work has been finished.")

Faux-amis fr\xE9quents :
- ACTUALLY (= "en fait", "\xE0 vrai dire") \u2260 "actuellement" (= currently / at the moment / nowadays)
- LIBRARY (= biblioth\xE8que) \u2260 "librairie" (= bookshop)
- TO ATTEND (= assister \xE0, participer \xE0) \u2260 "attendre" (= to wait for)
- SENSIBLE (= sens\xE9, raisonnable) \u2260 "sensible" (= sensitive)
- TO PASS AN EXAM (= r\xE9ussir un examen) \u2260 "passer un examen" (= to sit/take an exam)

Mots souvent confondus entre eux :
- BORING (qui provoque l'ennui) / BORED (qui ressent l'ennui) \u2014 m\xEAme logique pour interesting/interested, exciting/excited, tiring/tired.
- MAKE vs DO : DO pour les activit\xE9s g\xE9n\xE9rales, devoirs, t\xE2ches m\xE9nag\xE8res (do homework, do the housework, do sport) ; MAKE pour fabriquer, cr\xE9er, pr\xE9parer (make a cake, make a decision, make a mistake).
- SAY vs TELL : SAY + paroles ("He said hello"), TELL + personne ("He told me the truth").`,

    rule: `Les r\xE8gles de base (a/an/the/\xD8) s'appliquent aussi aux noms propres et aux lieux, mais avec des cas particuliers \xE0 conna\xEEtre.

PAS D'ARTICLE (\xD8) devant :
- les noms de pays, villes, continents au singulier : France, Paris, Africa, Spain
- les noms de personnes : Tom, Mrs Smith
- les noms de rues, monuments uniques sans "of" : Oxford Street, Buckingham Palace
- les institutions quand on parle de l'activit\xE9 en g\xE9n\xE9ral : "go to school", "go to hospital" (\xEAtre patient), "go to university", "in prison"

THE devant :
- les pays au pluriel ou contenant "Kingdom/States/Republic" : the United States, the United Kingdom, the Netherlands, the Philippines
- les cha\xEEnes de montagnes, groupes d'\xEEles, fleuves, oc\xE9ans, d\xE9serts : the Alps, the Canaries, the Thames, the Atlantic, the Sahara
- les noms de lieux avec "of" : the Tower of London, the Statue of Liberty
- les institutions quand on d\xE9signe le B\xC2TIMENT pr\xE9cis et non l'activit\xE9 : "I went to the school to meet the teacher" (j'y suis all\xE9 pour une raison pr\xE9cise, pas pour \xE9tudier)
- les h\xF4tels, cin\xE9mas, mus\xE9es, th\xE9\xE2tres souvent : the Hilton, the British Museum

A/AN reste utilis\xE9 pour une premi\xE8re mention non pr\xE9cis\xE9e, m\xEAme pour des lieux : "There is a park near my house."`,

  border: 2px solid var(--red);

  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.code-card__text {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.code-card__title {
  font-weight: 700;
  font-size: 0.95rem;
  line-height: 1.25;
}

.code-card__summary {
  font-size: 0.8rem;
  color: #7a7d8c;
  line-height: 1.25;
}

/* ---------- Detail view ---------- */

.back-link {
  background: none;
  border: none;
  font-family: inherit;
  font-size: 0.9rem;
  color: var(--red);
  cursor: pointer;
  padding: 0;
  margin-bottom: 18px;
  font-weight: 700;
}

.back-link:hover { text-decoration: underline; }

.detail__header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 18px;
}

.detail__number {
  font-family: 'Courier New', monospace;
  font-weight: 700;
  font-size: 1.6rem;
  color: var(--red);
  border: 2px solid var(--red);
  border-radius: 6px;
  width: 52px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.detail__title {
  font-family: 'Courier New', monospace;
  font-size: 1.25rem;
  margin: 0;
  line-height: 1.3;
}

.tabs {
  display: flex;
  gap: 8px;
  border-bottom: 2px solid var(--border);
  margin-bottom: 20px;
}

.tabs__btn {
  font-family: 'Courier New', monospace;
  font-size: 0.9rem;
  font-weight: 700;
  background: none;
  border: none;
  padding: 10px 4px;
  cursor: pointer;
  color: #9a9da8;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
}

.tabs__btn--active {
  color: var(--ink);
  border-bottom-color: var(--red);
}

.rule-box {
  background: var(--highlight);
  border: 2px solid var(--ink);
  border-radius: 8px;
  padding: 16px 18px;
  font-size: 0.95rem;
  line-height: 1.55;
  margin-bottom: 22px;
}

.rule-box p { margin: 0 0 8px 0; }
.rule-box p:last-child { margin-bottom: 0; }

.pitfalls {
  background: #f9e4e1;
  border: 2px solid var(--red);
  border-radius: 8px;
  padding: 14px 18px 14px 34px;
  margin: 0 0 22px 0;
  font-size: 0.92rem;
  line-height: 1.55;
}

.pitfalls li { margin-bottom: 6px; }
.pitfalls li:last-child { margin-bottom: 0; }

.section-title {
  font-family: 'Courier New', monospace;
  font-size: 1rem;
  letter-spacing: 0.05em;
  margin: 0 0 12px 0;
  text-transform: uppercase;
  color: #6b6f80;
}

.examples {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 24px;
}

.example {
  background: var(--card-bg);
  border: 2px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
}

.example__wrong, .example__right {
  margin: 0 0 4px 0;
  font-size: 0.92rem;
  line-height: 1.4;
}

.example__wrong { color: #8a3b35; text-decoration: line-through; }
.example__right { color: var(--green); font-weight: 700; text-decoration: none; }

.example__note {
  margin: 6px 0 0 0;
  font-size: 0.82rem;
  color: #7a7d8c;
  font-style: italic;
}

.tag {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  border-radius: 4px;
  font-size: 0.75rem;
  font-weight: 700;
  margin-right: 4px;
}

.tag--wrong { background: #f6dcd8; color: var(--red); }
.tag--right { background: #dfeedd; color: var(--green); }

/* ---------- Buttons ---------- */

.btn {
  font-family: 'Courier New', monospace;
  font-weight: 700;
  font-size: 0.95rem;
  border-radius: 8px;
  padding: 12px 20px;
  cursor: pointer;
  border: 2px solid var(--ink);
  background: var(--card-bg);
  color: var(--ink);
}

.btn:hover { background: var(--ink); color: var(--paper); }

.btn--primary {
  background: var(--ink);
  color: var(--paper);
}

.btn--primary:hover {
  background: var(--red);
  border-color: var(--red);
}

.btn--block { width: 100%; }

/* ---------- Quiz ---------- */

.quiz__progress {
  font-family: 'Courier New', monospace;
  font-size: 0.85rem;
  color: #7a7d8c;
  margin-bottom: 6px;
}

.quiz__bar {
  height: 6px;
  background: var(--border);
  border-radius: 4px;
  margin-top: 6px;
  overflow: hidden;
}

.quiz__bar-fill {
  height: 100%;
  background: var(--red);
  transition: width 0.2s;
}

.quiz__question {
  font-size: 1.05rem;
  font-weight: 700;
  margin: 18px 0 16px 0;
  line-height: 1.4;
}

.quiz__options {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 16px;
}

.quiz__option {
  text-align: left;
  font-family: Georgia, serif;
  font-size: 0.95rem;
  padding: 12px 14px;
  border: 2px solid var(--border);
  border-radius: 8px;
  background: var(--card-bg);
  cursor: pointer;
  line-height: 1.4;
}

.quiz__option:hover:not(:disabled) {
  border-color: var(--ink);
}

.quiz__option:disabled { cursor: default; }

.quiz__option--correct {
  border-color: var(--green);
  background: #e8f3e6;
  font-weight: 700;
}

.quiz__option--wrong {
  border-color: var(--red);
  background: #f9e4e1;
}

.quiz__feedback {
  background: var(--highlight);
  border: 2px solid var(--ink);
  border-radius: 8px;
  padding: 14px 16px;
}

.quiz__feedback-text {
  margin: 0 0 12px 0;
  font-size: 0.92rem;
  line-height: 1.5;
}

.quiz-result {
  text-align: center;
  padding: 30px 20px;
}

.quiz-result__score {
  font-family: 'Courier New', monospace;
  font-size: 3rem;
  font-weight: 700;
  color: var(--red);
  margin-bottom: 10px;
}

.quiz-result__message {
  font-size: 1rem;
  margin-bottom: 20px;
  color: #4a4d5e;
}

.fix-prompt {
  background: #f9e4e1;
  border: 2px solid var(--red);
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 0.98rem;
  line-height: 1.4;
  margin: 14px 0;
  color: #8a3b35;
}

/* ---------- Sentence checker ---------- */

.checker__intro {
  font-size: 0.95rem;
  line-height: 1.5;
  color: #4a4d5e;
  margin: 0 0 16px 0;
}

.checker__textarea {
  width: 100%;
  font-family: Georgia, serif;
  font-size: 0.98rem;
  padding: 12px 14px;
  border: 2px solid var(--border);
  border-radius: 8px;
  resize: vertical;
  background: var(--card-bg);
  color: var(--ink);
}

.checker__textarea:focus {
  outline: none;
  border-color: var(--ink);
}

.checker__actions {
  display: flex;
  gap: 10px;
  margin: 12px 0 4px 0;
}

.checker__error {
  color: var(--red);
  font-size: 0.9rem;
  margin-top: 12px;
}

.checker__result {
  margin-top: 18px;
  border-top: 2px solid var(--border);
  padding-top: 16px;
}

.checker__status {
  font-family: 'Courier New', monospace;
  font-weight: 700;
  font-size: 0.95rem;
  margin: 0 0 12px 0;
}

.checker__status--ok { color: var(--green); }
.checker__status--ko { color: var(--red); }

.checker__explanation {
  font-size: 0.92rem;
  line-height: 1.55;
  margin: 12px 0 0 0;
  background: var(--highlight);
  border: 2px solid var(--ink);
  border-radius: 8px;
  padding: 12px 16px;
}

/* ---------- Footer ---------- */

.footer {
  text-align: center;
  font-size: 0.8rem;
  color: #9a9da8;
  padding: 20px;
  border-top: 2px solid var(--border);
}
