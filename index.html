Règle pratique : si on peut ajouter une date précise (yesterday, in 2019...) → past simple. Si l'action n'est pas datée et garde un lien avec maintenant → present perfect.`,

      "Utiliser le present perfect avec un marqueur de date précise : « I have seen him yesterday » → « I saw him yesterday ».",

      "Oublier HAVE/HAS : « I seen this film » au lieu de « I have seen this film ».",

    title: "Le futur (will / going to / present continuous)",
    summary: "Prédiction, intention, projet ou programme",
    rule: `Il existe trois façons principales d'exprimer le futur en anglais, selon le degré de certitude et de préparation :

WILL + infinitif sans "to" : 
- prédiction générale, sans preuve particulière ("I think she will win.")
- décision spontanée, prise au moment où l'on parle ("It's cold, I'll close the window.")
- promesse, offre, menace ("I'll help you.")

BE GOING TO + infinitif :
- intention/projet déjà décidé avant le moment où l'on parle ("I'm going to study medicine.")
- prédiction basée sur une preuve visible dans le présent ("Look at those clouds, it's going to rain.")

PRESENT CONTINUOUS (be + V-ing) :
- projet futur précis et déjà organisé, souvent avec une date/heure ("I'm meeting Sam at 5pm tomorrow.")

Astuce : "going to" et "present continuous" expriment souvent une intention déjà là ; "will" exprime quelque chose de plus spontané ou de plus général.`,

    id: 6,
    title: "Les modaux (can, must, should, may...)",
    summary: "Capacité, obligation, conseil, permission, possibilité",
    rule: `Les modaux (can, could, must, should, may, might, will, would, shall) sont des auxiliaires invariables : ils ne prennent JAMAIS de -s à la 3e personne et sont TOUJOURS suivis du verbe à l'infinitif SANS "to".

CAN / COULD : capacité ("She can swim"), permission ("Can I go out?"), could = passé de can ou demande polie.
MUST : obligation forte, souvent imposée par celui qui parle ("You must wear a seatbelt.")
HAVE TO : obligation externe, imposée par une règle/situation extérieure ("I have to wear a uniform at school.")
MUSTN'T : interdiction ("You mustn't smoke here.")
DON'T HAVE TO : absence d'obligation, ce n'est pas nécessaire ("You don't have to come if you're busy.")
SHOULD / SHOULDN'T : conseil, recommandation.
MAY / MIGHT : possibilité, permission formelle (may).

Différence clé : MUSTN'T (interdit de) ≠ DON'T HAVE TO (pas obligé de, mais autorisé).`,

    id: 7,
    title: "Les articles (a / an / the / Ø)",
    summary: "Article indéfini, défini, ou absence d'article",
    rule: `A / AN (article indéfini) : devant un nom comptable singulier, non précisé, mentionné pour la première fois.
- A devant un son consonne : a book, a university (le "u" se prononce "you")
- AN devant un son voyelle : an apple, an hour (le "h" est muet)

THE (article défini) : devant un élément précis, déjà connu de l'interlocuteur, unique en son genre, déjà mentionné, ou désigné par un superlatif.
- 1ère mention : "I saw a film." → 2e mention : "The film was great."
- Éléments uniques : the sun, the moon, the internet
- Superlatifs : the best, the most interesting

PAS D'ARTICLE (Ø) dans les cas suivants :
- noms pluriels ou indénombrables employés de façon générale : "I like cats." / "Music is important."
- matières scolaires, langues, sports, jeux, repas : "I study French.", "We play football.", "We have breakfast at 8."
- la plupart des noms propres de personnes et de pays : "Tom lives in France."
- moyens de transport après "by" : by bus, by car, by plane.`,

    id: 8,
    title: "Pluriels et indénombrables",
    summary: "Noms comptables / non comptables, pluriels irréguliers",
    rule: `Les noms COMPTABLES (countable) peuvent se compter et avoir un pluriel : a book / two books / many books.
Les noms NON COMPTABLES (uncountable) ne se comptent pas directement, n'ont pas de pluriel, et sont suivis d'un verbe au SINGULIER.
Exemples fréquents de noms indénombrables : information, advice, money, news, furniture, water, bread, homework, luggage, traffic.

Pour quantifier un indénombrable, on utilise : some, a lot of, a piece of, a bit of (some information, a piece of advice).

MUCH / MANY / A LOT OF :
- MANY + nom comptable pluriel (how many books?)
- MUCH + nom indénombrable (how much money?)
- A LOT OF fonctionne avec les deux.

PLURIELS IRRÉGULIERS à connaître :
man → men, woman → women, child → children, person → people, foot → feet, tooth → teeth, mouse → mice.

Certains noms se terminant par -s sont toujours au singulier : news, maths, physics ("The news is good.")`,

    summary: "IN / ON / AT selon le contexte",
    rule: `PRÉPOSITIONS DE TEMPS :
- AT : moment précis dans la journée → at 7am, at noon, at midnight, at night. Aussi : at the weekend (UK), at Christmas, at the moment.
- ON : jours et dates précises → on Monday, on 5th May, on my birthday, on Christmas Day.
- IN : périodes plus longues → mois (in June), années (in 2020), saisons (in summer), parties de la journée (in the morning/afternoon/evening), durée pour faire quelque chose (in 10 minutes).

PRÉPOSITIONS DE LIEU :
- AT : un point précis, une adresse, un lieu d'activité → at the bus stop, at school, at home, at the door.
- ON : une surface, un support → on the table, on the wall, on the first floor, on the bus/train (transports publics).
- IN : un espace fermé ou délimité → in the box, in the garden, in London, in the car (véhicule individuel).

Astuce mnémotechnique : du plus précis au plus large pour le temps → AT (heure) < ON (jour) < IN (mois/année/saison).`,

- AVANT le verbe principal : "I often watch TV."
- APRÈS l'auxiliaire ou BE : "I am often tired." / "She has never been to Spain."

it → it → its → (rare)

   COMPOSANT : Quiz scoré
   ============================================================ */

function Quiz({ quiz }) {
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState(null);
  const [score, setScore] = useState(0);
  const [finished, setFinished] = useState(false);
  const [answered, setAnswered] = useState(false);

  const q = quiz[current];

  function handleAnswer(idx) {
    if (answered) return;
    setSelected(idx);
    setAnswered(true);
    if (idx === q.correct) setScore((s) => s + 1);
  }

  function handleNext() {
    if (current + 1 < quiz.length) {
      setCurrent((c) => c + 1);
      setSelected(null);
      setAnswered(false);
    } else {
      setFinished(true);
    }
  }

  function handleRestart() {
    setCurrent(0);
    setSelected(null);
    setScore(0);
    setFinished(false);
    setAnswered(false);
  }

  if (finished) {
    const percent = Math.round((score / quiz.length) * 100);
    let message = "Encore un effort, relis bien la règle puis retente le quiz.";
    if (percent >= 50) message = "Pas mal ! Quelques révisions et ce sera parfait.";
    if (percent >= 75) message = "Très bien ! Cette règle est presque maîtrisée.";
    if (percent === 100) message = "Score parfait ! Cette règle est maîtrisée.";

    return (
      <div className="quiz-result">
        <div className="quiz-result__score">{score} / {quiz.length}</div>
        <p className="quiz-result__message">{message}</p>
        <button className="btn btn--primary" onClick={handleRestart}>
          Refaire le quiz
        </button>
      </div>
    );
  }

  return (
    <div className="quiz">
      <div className="quiz__progress">
        Question {current + 1} / {quiz.length}
        <div className="quiz__bar">
          <div
            className="quiz__bar-fill"
            style={{ width: `${((current + (answered ? 1 : 0)) / quiz.length) * 100}%` }}
          />
        </div>
      </div>

      <p className="quiz__question">{q.q}</p>

      <div className="quiz__options">
        {q.options.map((opt, idx) => {
          let cls = "quiz__option";
          if (answered) {
            if (idx === q.correct) cls += " quiz__option--correct";
            else if (idx === selected) cls += " quiz__option--wrong";
          }
          return (
            <button
              key={idx}
              className={cls}
              onClick={() => handleAnswer(idx)}
              disabled={answered}
            >
              {opt}
            </button>
          );
        })}
      </div>

      {answered && (
        <div className="quiz__feedback">
          <p className="quiz__feedback-text">
            {selected === q.correct ? "✅ Correct ! " : "❌ Pas tout à fait. "}
            {q.explanation}
          </p>
          <button className="btn btn--primary" onClick={handleNext}>
            {current + 1 < quiz.length ? "Question suivante" : "Voir le score"}
          </button>
        </div>
      )}
    </div>
  );
}

// Normalise une phrase pour comparaison tolérante :
// minuscules, espaces multiples réduits, ponctuation de fin ignorée,
// apostrophes typographiques uniformisées.
function normalize(str) {
  return str
    .toLowerCase()
    .replace(/[’‘`]/g, "'")
    .replace(/[.!?]+\s*$/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function CorrectionExercise({ code }) {
  const items = code.fix || [];
  const [index, setIndex] = useState(0);
  const [answer, setAnswer] = useState("");
  const [checked, setChecked] = useState(false);
  const [isCorrect, setIsCorrect] = useState(false);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);

  if (items.length === 0) {
    return <p className="checker__intro">Aucun exercice de correction pour cette fiche.</p>;
  }

  const item = items[index];

  function handleCheck() {
    if (!answer.trim() || checked) return;
    const accepted = [item.right, ...(item.alsoAccept || [])].map(normalize);
    const ok = accepted.includes(normalize(answer));
    setIsCorrect(ok);
    if (ok) setScore((s) => s + 1);
    setChecked(true);
  }

  function handleNext() {
    if (index + 1 < items.length) {
      setIndex((i) => i + 1);
      setAnswer("");
      setChecked(false);
      setIsCorrect(false);
    } else {
      setDone(true);
    }
  }

  function handleRestart() {
    setIndex(0);
    setAnswer("");
    setChecked(false);
    setIsCorrect(false);
    setScore(0);
    setDone(false);
  }

  if (done) {
    return (
      <div className="quiz-result">
        <div className="quiz-result__score">{score} / {items.length}</div>
        <p className="quiz-result__message">
          {score === items.length
            ? "Parfait ! Tu sais corriger ce type d'erreur."
            : "Bien joué. Relis la règle et retente pour progresser."}
        </p>
        <button className="btn btn--primary" onClick={handleRestart}>
          Recommencer l'exercice
        </button>
      </div>
    );
  }

  return (
    <div className="checker">
      <p className="checker__intro">
        Voici une phrase contenant une erreur liée à la règle « {code.title} ».
        Réécris-la correctement, puis vérifie.
      </p>

      <div className="quiz__progress">
        Phrase {index + 1} / {items.length}
        <div className="quiz__bar">
          <div
            className="quiz__bar-fill"
            style={{ width: `${((index + (checked ? 1 : 0)) / items.length) * 100}%` }}
          />
        </div>
      </div>

      <div className="fix-prompt">
        <span className="tag tag--wrong">✗</span> {item.wrong}
      </div>

      <textarea
        className="checker__textarea"
        value={answer}
        onChange={(e) => setAnswer(e.target.value)}
        placeholder="Réécris la phrase corrigée ici..."
        rows={2}
        disabled={checked}
      />

      {!checked && (
        <div className="checker__actions">
          <button
            className="btn btn--primary"
            onClick={handleCheck}
            disabled={!answer.trim()}
          >
            Vérifier
          </button>
        </div>
      )}

      {checked && (
        <div className="checker__result">
          <p className={"checker__status" + (isCorrect ? " checker__status--ok" : " checker__status--ko")}>
            {isCorrect ? "✅ Correct !" : "❌ Pas tout à fait."}
          </p>

          {!isCorrect && (
            <div className="examples">
              <div className="example">
                <p className="example__wrong">
                  <span className="tag tag--wrong">✗</span> {answer.trim()}
                </p>
                <p className="example__right">
                  <span className="tag tag--right">✓</span> {item.right}
                </p>
              </div>
            </div>
          )}

          {isCorrect && (
            <div className="examples">
              <div className="example">
                <p className="example__right">
                  <span className="tag tag--right">✓</span> {item.right}
                </p>
              </div>
            </div>
          )}

          <p className="checker__explanation">{item.explanation}</p>

          <div className="checker__actions">
            <button className="btn btn--primary" onClick={handleNext}>
              {index + 1 < items.length ? "Phrase suivante" : "Voir le score"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   COMPOSANT : Fiche détaillée d'un code
   ============================================================ */

function CodeDetail({ code, onBack }) {
  const [tab, setTab] = useState("rule");

  return (
    <div className="detail">
      <button className="back-link" onClick={onBack}>
        ← Retour à la liste
      </button>

      <div className="detail__header">
        <span className="detail__number">{String(code.id).padStart(2, "0")}</span>
        <h2 className="detail__title">{code.title}</h2>
      </div>

      <div className="tabs">
        <button
          className={"tabs__btn" + (tab === "rule" ? " tabs__btn--active" : "")}
          onClick={() => setTab("rule")}
        >
          Règle &amp; exemples
        </button>
        <button
          className={"tabs__btn" + (tab === "quiz" ? " tabs__btn--active" : "")}
          onClick={() => setTab("quiz")}
        >
          Quiz
        </button>
        <button
          className={"tabs__btn" + (tab === "check" ? " tabs__btn--active" : "")}
          onClick={() => setTab("check")}
        >
          Corrige la phrase
        </button>
      </div>

      {tab === "rule" && (
        <div className="detail__content">
          <div className="rule-box">
            {code.rule.split("\n").map((line, i) =>
              line.trim() === "" ? <br key={i} /> : <p key={i}>{line}</p>
            )}
          </div>

          {code.pitfalls && (
            <>
              <h3 className="section-title">Pièges fréquents</h3>
              <ul className="pitfalls">
                {code.pitfalls.map((p, i) => (
                  <li key={i}>{p}</li>
                ))}
              </ul>
            </>
          )}

          <h3 className="section-title">Exemples</h3>
          <div className="examples">
            {code.examples.map((ex, i) => (
              <div className="example" key={i}>
                <p className="example__wrong">
                  <span className="tag tag--wrong">✗</span> {ex.wrong}
                </p>
                <p className="example__right">
                  <span className="tag tag--right">✓</span> {ex.right}
                </p>
                {ex.note && <p className="example__note">{ex.note}</p>}
              </div>
            ))}
          </div>

          <button className="btn btn--primary btn--block" onClick={() => setTab("quiz")}>
            Faire le quiz →
          </button>
        </div>
      )}

      {tab === "quiz" && (
        <div className="detail__content">
          <Quiz quiz={code.quiz} key={code.id} />
        </div>
      )}

      {tab === "check" && (
        <div className="detail__content">
          <CorrectionExercise code={code} key={code.id} />
        </div>
      )}
    </div>
  );
}

/* ============================================================
   COMPOSANT : Chargement de la police Google Fonts
   ============================================================ */

function FontLoader() {
  useEffect(() => {
    const id = "fredoka-font-link";
    if (document.getElementById(id)) return;
    const link = document.createElement("link");
    link.id = id;
    link.rel = "stylesheet";
    link.href =
      "https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap";
    document.head.appendChild(link);
  }, []);
  return null;
}

/* ============================================================
   COMPOSANT PRINCIPAL
   ============================================================ */

function App() {
  const [selectedId, setSelectedId] = useState(null);
  const selectedCode = CODES.find((c) => c.id === selectedId);

  return (
    <div className="app">
      <style>{STYLES}</style>

      <FontLoader />

      <header className="header">
        <div className="header__inner">
          <img className="logo" src={LOGO_SRC} alt="Logo BROT2YOU" />
          <div>
            <h1 className="header__title">Mind the Mistake!</h1>
            <p className="header__subtitle">
              Anglais — entraîne-toi sur le numéro noté dans la marge de ta copie
            </p>
          </div>
        </div>
      </header>

      <main className="main">
        {!selectedCode ? (
          <>
            <p className="intro">
              Trouve sur ta copie le numéro écrit en marge par ton professeur, puis clique sur la
              fiche correspondante pour revoir la règle et t'entraîner.
            </p>
            <div className="grid">
              {CODES.map((code) => (
                <CodeCard key={code.id} code={code} onSelect={setSelectedId} />
              ))}
            </div>
          </>
        ) : (
          <CodeDetail code={selectedCode} onBack={() => setSelectedId(null)} />
        )}
      </main>

      <footer className="footer">Fiches de correction — Anglais</footer>
    </div>
  );
}
